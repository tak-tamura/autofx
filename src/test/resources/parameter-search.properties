# GMOコインから取得する通貨ペア。現行の基準戦略に合わせてUSD/JPYを指定する。
market.currency-pair=USD_JPY
# ローソク足の時間足。1hは1時間足を表す。
market.time-frame=1h
# 取得する価格種別。現在のPublicApi.getKlines()はASK固定のためASKを指定する。
market.price-type=ASK
# GMOコインのopenTimeを解釈し、探索データの日時として扱うタイムゾーン。
market.time-zone=Asia/Tokyo
# trueの場合、まだ確定していない形成中のローソク足を探索データから除外する。
market.exclude-incomplete-candle=true

# GMOコインへ指定するAPI日付の開始日。1時間足の日次取得は2023-10-28以降を指定する。
period.dataset-from=2023-10-28
# GMOコインへ指定するAPI日付の終了日。API日付はJST 6:00に切り替わるため、翌日5:59までの足を含み得る。
period.dataset-to=2025-12-31
# パラメータ候補の探索に使用するIn-sample期間の開始日。
period.in-sample-from=2023-10-28
# パラメータ候補の探索に使用するIn-sample期間の終了日。
period.in-sample-to=2024-12-31
# 探索で未使用のデータを使って候補を評価するOut-of-sample期間の開始日。
period.out-of-sample-from=2025-01-01
# Out-of-sample期間の終了日。この期間の結果を使って候補を再選定しない。
period.out-of-sample-to=2025-12-31

# エントリーの約定タイミング。NEXT_CANDLE_OPENはシグナル判定足の次足始値で約定する。
execution.entry-timing=NEXT_CANDLE_OPEN
# 足内の決済判定方式。OHLC_HIGH_LOWは高値・安値への接触でSL/TPを判定する。
execution.intrabar-exit-model=OHLC_HIGH_LOW
# 同一足でSLとTPの両方に触れた場合の規則。STOP_FIRSTは保守的にSLを優先する。
execution.both-touched-policy=STOP_FIRST
# データ末尾で未決済ポジションが残った場合の規則。最終足終値で強制決済する。
execution.final-position-policy=CLOSE_AT_FINAL_CLOSE
# 1取引に適用するスプレッド。現時点では未実装のため明示的にゼロとする。
execution.spread=0
# 1取引に適用するスリッページ。現時点では未実装のため明示的にゼロとする。
execution.slippage=0
# 1取引に適用する手数料。現時点では未実装のため明示的にゼロとする。
execution.commission=0
